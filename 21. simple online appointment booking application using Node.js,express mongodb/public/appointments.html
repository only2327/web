<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>View Appointments | Online Booking</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
        <line x1="16" y1="2" x2="16" y2="6"></line>
        <line x1="8" y1="2" x2="8" y2="6"></line>
        <line x1="3" y1="10" x2="21" y2="10"></line>
      </svg>
      BookMe
    </h1>
    <nav>
      <a href="index.html">Book Appointment</a>
      <a href="appointments.html" class="active">View Appointments</a>
    </nav>
  </header>

  <main>
    <div class="appointments-container" style="width: 100%;">
      <h2>Booked Appointments</h2>
      
      <div id="appointmentsList" class="appointments-grid">
        <!-- Appointments will be loaded here dynamically -->
        <div class="no-appointments" style="grid-column: 1 / -1;">
          Loading appointments...
        </div>
      </div>
    </div>
  </main>

  <!-- Edit Modal -->
  <div id="editModal" class="modal">
    <div class="modal-content">
      <span class="close-btn" id="closeModalBtn">&times;</span>
      <h2 style="margin-bottom: 1.5rem; text-align: center;">Edit Appointment</h2>
      <form id="editForm">
        <input type="hidden" id="editId">
        <div class="form-group">
          <label for="editName">Full Name</label>
          <input type="text" id="editName" class="form-control" required>
        </div>
        <div class="form-group">
          <label for="editService">Select Service</label>
          <select id="editService" class="form-control" required>
            <!-- Loaded dynamically -->
          </select>
        </div>
        <div class="form-group">
          <label for="editDate">Date</label>
          <input type="date" id="editDate" class="form-control" required>
        </div>
        <div class="form-group">
          <label for="editTime">Time</label>
          <input type="time" id="editTime" class="form-control" required>
        </div>
        <button type="submit">Update Appointment</button>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
